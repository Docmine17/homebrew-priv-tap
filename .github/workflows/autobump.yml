name: Automatizar Bot do Homebrew

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Rodar Bump do Cask
        # Aqui usamos o macauley que é o porte da comunidade específico para Casks!
        uses: macauley/action-homebrew-bump-cask@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tap: docmine17/homebrew-priv-tap
          cask: android-studio-linux
          livecheck: true
