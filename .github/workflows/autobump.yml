name: Automatizar Bot do Homebrew

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código fonte
        uses: actions/checkout@v4

      - name: Instalar Homebrew no Servidor do Github
        uses: Homebrew/actions/setup-homebrew@master

      - name: Rodar Bump do Cask
        uses: macauley/action-homebrew-bump-cask@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tap: docmine17/homebrew-priv-tap
          cask: android-studio-linux
          livecheck: true
