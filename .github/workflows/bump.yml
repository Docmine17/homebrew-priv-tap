name: Atualizar Casks (Bump)

on:
  schedule:
    # Executa todos os dias à meia-noite UTC (~21:00 no Brasil)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Permite disparar o workflow manualmente pela aba Actions do GitHub

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checar o repositório
        uses: actions/checkout@v4

      - name: Configurar o Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # A action abaixo é amplamente usada pela comunidade do Homebrew 
      # para buscar atualizações usando o `livecheck` e gerar um Pull Request 
      # com as alterações de versão e sha256 atualizadas.
      - name: Atualizar android-studio-linux
        uses: macauley/action-homebrew-bump-cask@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          cask: android-studio-linux
          livecheck: true
